name: Build, Push and Deploy

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.image-tag.outputs.image_tag }}

    env:
      ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
      BACKEND_REPOSITORY: ${{ vars.BACKEND_REPOSITORY }}
      FRONTEND_REPOSITORY: ${{ vars.FRONTEND_REPOSITORY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build Backend JAR
        working-directory: backend
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate Image Tag
        id: image-tag
        run: |
          TIMESTAMP=$(date -u +"%Y%m%d-%H%M%S")
          SHORT_SHA=${GITHUB_SHA::12}
          IMAGE_TAG=${TIMESTAMP}-${SHORT_SHA}

          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Build Backend Image
        run: |
          docker build -t $ECR_REGISTRY/$BACKEND_REPOSITORY:$IMAGE_TAG ./backend

      - name: Tag Backend Latest
        run: |
          docker tag $ECR_REGISTRY/$BACKEND_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$BACKEND_REPOSITORY:latest

      - name: Push Backend Image
        run: |
          docker push $ECR_REGISTRY/$BACKEND_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$BACKEND_REPOSITORY:latest

      - name: Build Frontend Image
        run: |
          docker build -t $ECR_REGISTRY/$FRONTEND_REPOSITORY:$IMAGE_TAG ./frontend

      - name: Tag Frontend Latest
        run: |
          docker tag $ECR_REGISTRY/$FRONTEND_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$FRONTEND_REPOSITORY:latest

      - name: Push Frontend Image
        run: |
          docker push $ECR_REGISTRY/$FRONTEND_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$FRONTEND_REPOSITORY:latest

      - name: Upload docker-compose.yml to S3
        run: |
          aws s3 cp docker-compose.yml s3://${{ vars.S3_BUCKET }}/docker-compose.yml

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            export ECR_REGISTRY=${{ vars.ECR_REGISTRY }}
            export BACKEND_REPOSITORY=${{ vars.BACKEND_REPOSITORY }}
            export FRONTEND_REPOSITORY=${{ vars.FRONTEND_REPOSITORY }}
            export IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}

            echo "ECR_REGISTRY=$ECR_REGISTRY"
            echo "BACKEND_REPOSITORY=$BACKEND_REPOSITORY"
            echo "FRONTEND_REPOSITORY=$FRONTEND_REPOSITORY"
            echo "IMAGE_TAG=$IMAGE_TAG"

            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin $ECR_REGISTRY

            mkdir -p ~/app

            cd ~/app

            aws s3 cp s3://${{ vars.S3_BUCKET }}/docker-compose.yml .

            docker system prune -af

            docker compose pull

            docker compose up -d

      - name: Verify Deployment
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://${{ secrets.EC2_HOST }}:3000)

          if [ "$STATUS" != "200" ]; then
            echo "Application is not running"
            exit 1
          fi

          echo "Application is running successfully"
