```yaml
name: Build and Push Docker Images

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build Backend JAR
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Backend Docker Image
        run: |
          docker build -t backend ./backend

      - name: Tag Backend Docker Image
        run: |
          docker tag backend:latest 924982554051.dkr.ecr.ap-south-1.amazonaws.com/backend-repository-alan:${{ github.sha }}

      - name: Push Backend Docker Image
        run: |
          docker push 924982554051.dkr.ecr.ap-south-1.amazonaws.com/backend-repository-alan:${{ github.sha }}

      - name: Build Frontend Docker Image
        run: |
          docker build -t frontend ./frontend

      - name: Tag Frontend Docker Image
        run: |
          docker tag frontend:latest 924982554051.dkr.ecr.ap-south-1.amazonaws.com/frontend-repository-alan:${{ github.sha }}

      - name: Push Frontend Docker Image
        run: |
          docker push 924982554051.dkr.ecr.ap-south-1.amazonaws.com/frontend-repository-alan:${{ github.sha }}
```
